<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class="bg-success text-white text-center p-4" >
        <h1>Contacto William</h1>
    </header>  
    <!-- Navegación -->    
    <nav class="navbar navbar-expand-lg bg-dark mb-4">
        <div class="container">
            <ul class="navbar-nav ms-auto fs-4">
                <li class="nav-item">
                    <a class="nav-link text-white" href="index.html">Inicio</a>
                </li>
                <li class="nav-item">
                   <a class="nav-link text-white" href="contacto.html">Contacto</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="https://feriavocacional.ucr.ac.cr/informatica-empresarial/" target="_blank">Página de la carrera</a> 
                </li>

            </ul>
  
        </div>
       
    </nav>

    <!-- Contenido Principal -->
    <div class="container">
        <div class="row justify-content-center">
            
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm mb-5"> 
                    <div class="card-header bg-success text-white">
                        <h2>Formulario</h2>

                    </div>

                    <div class="card-body">
                        <form action="">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Digite su nombre">
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Correo</label>
                                <input type="email" class="form-control" id="email" placeholder="Digite su correo">
                            </div>

                            <div class="mb-3">
                                <label for="comentarios" class="form-label">Comentarios</label>
                                <textarea class="form-control" id="comentarios" rows="3" placeholder="Digite sus comentarios"></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary">Enviar</button>

                        </form>
                    </div>

                 </div>

             </div>
        </div>     
       
    </div>
      <footer class="bg-dark text-white text-center p-3 mt-5">
        <p class="mb-0">Elaborado por William, 2026</p>
    </footer>
</body>
</html>
